<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-slogan">
            <h1>Start Your Day with Purpose</h1>
            <p>One task at a time. Build your success story.</p>
        </div>
        
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-check-double"></i>
                </div>
                <h2>Welcome to TaskFlow</h2>
                <p>Sign in to continue your journey</p>
            </div>
            
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i> 
                        Username
                    </label>
                    <input type="text" id="username" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope"></i> 
                        Email
                    </label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i> 
                        Password
                    </label>
                    <input type="password" id="password" placeholder="Create a password" required minlength="4">
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-rocket"></i> 
                    Get Started
                </button>
            </form>
            
            <div class="login-footer">
                <p>By signing in, you agree to our 
                    <a href="#">Terms</a> & <a href="#">Privacy</a>
                </p>
            </div>
        </div>
        
        <div class="more-slogans">
            <p>"The secret of getting ahead is getting started." - Mark Twain</p>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
